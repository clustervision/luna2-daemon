{% autoescape None %}
{% set ns = namespace(subnet_id=1) %}
#
# DHCP Server Configuration file.
# created by Luna
#

{
  "Dhcp6": {
    "ddns-send-updates": true,
    "ddns-override-client-update": true,
    "ddns-override-no-update": true,
    "dhcp-ddns": {
      "enable-updates": true,
      "server-ip": "127.0.0.1",
      "server-port": 53001
    },

    "interfaces-config": {
        "interfaces": [ "*" ]
    },

    "lease-database": {
        "type": "memfile",
        "persist": true,
        "name": "kea-leases6.csv",
        "lfc-interval": 1800,
        "max-row-errors": 100
    },

    "option-def": [
      {
        "name": "luna-id",
        "code": 129,
        "space": "dhcp6",
        "type": "string"
      }
    ],

    "subnet6": [
{%- for SHARE in SHARED -%}
    {%- for SUBNET in SHARED[SHARE] %}
      {
        "id": {{ ns.subnet_id }},
        {%- set ns.subnet_id = ns.subnet_id + 1 %}
        "subnet": "{{ SHARED[SHARE][SUBNET]['network'] }}/{{ SHARED[SHARE][SUBNET]['prefix'] }}",
        "valid-lifetime": 28800,
        {%- if SUBNET in INTERFACES %}
        "interface": "{{ INTERFACES[SUBNET] }}",
        {%- elif SHARE in INTERFACES %}
        "interface": "{{ INTERFACES[SHARE] }}",
        {%- else %}
        "interface": "ens6",
        {%- endif -%}
        {%- if SUBNET in POOLS %}
        "client-classes": ["{{ POOLS[SUBNET]['members']|first }}-class"],
        {%- elif SHARE in POOLS and SUBNET not in POOLS %}
        "client-classes": ["ipxe-{{ SHARE }}", "arch-x86-{{ SHARE }}", "arch-arm-{{ SHARE }}", "arch-openpower"],
        {%- endif %}

        {%- if SUBNET in POOLS or (SHARE in POOLS and SUBNET not in POOLS) %}
            {%- if SUBNET in POOLS %}
                {%- if POOLS[SUBNET]['range_begin'] is defined and POOLS[SUBNET]['range_end'] is defined %}
        "pools": [
          {
            "pool": "{{ POOLS[SUBNET]['range_begin'] }}-{{ POOLS[SUBNET]['range_end'] }}"
          }
        ],
                {%- endif %}
            {%- elif SHARE in POOLS and SUBNET not in POOLS %}
                {%- if POOLS[SHARE]['range_begin'] is defined and POOLS[SHARE]['range_end'] is defined %}
        "pools": [
          {
            "pool": "{{ POOLS[SHARE]['range_begin'] }}-{{ POOLS[SHARE]['range_end'] }}"
          }
        ],
                {%- endif %}
            {%- endif %}
        {%- endif %}

        {%- if SUBNET in RESERVATIONS and RESERVATIONS[SUBNET] | length > 0 %}
        "reservations": [
            {%- for HOST in RESERVATIONS[SUBNET] %}
          {
            "hw-address": "{{ HOST['macaddress'] }}",
            "ip-addresses": ["{{ HOST['ipaddress'] }}"],
            "hostname": "{{ HOST['name'] }}"
                {%- if HOST.get('nextserver') %},
            "client-classes": [ "{{ HOST['ipxe_kernel_class'] }}" ]
                {%- endif %}
                {%- if loop.last %}
          }
                {%- else %}
          },
                {%- endif -%}
            {%- endfor %}
        ],
        {%- endif -%}
        {%- if SUBNET in ZONES %}
        "ddns-qualifying-suffix": "{{ ZONES[SUBNET]['domain'] }}.",
        {%- endif %}
        "option-data": [
        {%- if SHARED[SHARE][SUBNET]['nameserver_ip_ipv6'] %}
          { "name": "dns-servers", "csv-format": true, "data": "{{ SHARED[SHARE][SUBNET]['nameserver_ip_ipv6'] }}" },
        {%- endif -%}
        {%- if SHARED[SHARE][SUBNET]['ntp_server'] and ':' in SHARED[SHARE][SUBNET]['ntp_server'] %}
          { "name": "ntp-server", "csv-format": true, "data": "{{ SHARED[SHARE][SUBNET]['ntp_server'] }}" },
        {%- endif -%}
        {%- if SHARED[SHARE][SUBNET]['domain'] is defined %}
          { "name": "domain-search", "csv-format": true, "data": "{{ SHARED[SHARE][SUBNET]['domain'] }}" },
        {%- endif %}
          { "name": "luna-id", "data": "lunaclient" }
        ]
        {%- if loop.last and SUBNETS|length == 0 %}
      }
        {%- else %}
      },
        {%- endif %}
    {%- endfor -%}
{%- endfor -%}

{% for SUBNET in SUBNETS %}
      {
        "id": {{ ns.subnet_id }},
        {%- set ns.subnet_id = ns.subnet_id + 1 %}
        "subnet": "{{ SUBNETS[SUBNET]['network'] }}/{{ SUBNETS[SUBNET]['prefix'] }}",
        "valid-lifetime": 28800,
        {%- if SUBNET in INTERFACES %}
        "interface": "{{ INTERFACES[SUBNET] }}",
        {%- else %}
        "interface": "ens6",
        {%- endif %}
        "client-classes": ["ipxe-{{ SUBNET }}", "arch-x86-{{ SUBNET }}", "arch-arm-{{ SUBNET }}", "arch-openpower"],

        {%- if SUBNETS[SUBNET]['range_begin'] is defined and SUBNETS[SUBNET]['range_end'] is defined %}
        "pools": [
          {
	        "pool": "{{ SUBNETS[SUBNET]['range_begin'] }}-{{ SUBNETS[SUBNET]['range_end'] }}"
	  }
        ],
        {%- endif %}
    {%- if SUBNET in RESERVATIONS and RESERVATIONS[SUBNET] | length > 0 %}
        "reservations": [
        {%- for HOST in RESERVATIONS[SUBNET] %}
          {
            "hw-address": "{{ HOST['macaddress'] }}",
            "ip-addresses": ["{{ HOST['ipaddress'] }}"],
            "hostname": "{{ HOST['name'] }}"
          {%- if HOST.get('nextserver') %},
            "client-classes": [ "{{ HOST['ipxe_kernel_class'] }}" ]
          {%- endif %}
          {%- if loop.last %}
          }
          {%- else %}
          },
          {%- endif -%}
        {%- endfor %}
        ],
    {%- endif -%}
    {%- if SUBNET in ZONES %}
        "ddns-qualifying-suffix": "{{ ZONES[SUBNET]['domain'] }}.",
    {%- endif %}
        "option-data": [
    {%- if SUBNETS[SUBNET]['nameserver_ip_ipv6'] %}
          { "name": "dns-servers", "csv-format": true, "data": "{{ SUBNETS[SUBNET]['nameserver_ip_ipv6'] }}" },
    {%- endif -%}
    {%- if SUBNETS[SUBNET]['ntp_server'] and ':' in SUBNETS[SUBNET]['ntp_server'] %}
          { "name": "ntp-server", "csv-format": true, "data": "{{ SUBNETS[SUBNET]['ntp_server'] }}" },
    {%- endif -%}
    {%- if SUBNETS[SUBNET]['domain'] is defined %}
          { "name": "domain-search", "csv-format": true, "data": "{{ SUBNETS[SUBNET]['domain'] }}" },
    {%- endif %}
          { "name": "luna-id", "data": "lunaclient" }
        ]
    {%- if loop.last %}
      }
    {%- else %}
      },
    {%- endif %}
{%- endfor %}
    ],

    "client-classes": [
{%- for CLASS in CLASSES %}
      {
        "name": "{{ CLASSES[CLASS]['network'] }}-class",
        "test": "substring(option[16].text, 0, 5) == 'udhcp'"
      },
{%- endfor -%}

{%- for SHARE in SHARED -%}
    {%- for SUBNET in SHARED[SHARE] -%}
        {%- if SHARED[SHARE][SUBNET]['nextserver'] is defined %}
      {
        "name": "ipxe-{{ SHARE }}",
        "test": "substring(option[15].hex,2,4) == 'iPXE'",
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "http://[{{ SHARED[SHARE][SUBNET]['nextserver'] }}]:{{ SHARED[SHARE][SUBNET]['nextport'] }}/boot"
          }
        ]
      },
        {%- endif -%}
    {%- endfor -%}
{%- endfor -%}

{%- for SUBNET in SUBNETS -%}
    {%- if SUBNETS[SUBNET]['nextserver'] is defined %}
      {
        "name": "ipxe-{{ SUBNET }}",
        "test": "substring(option[15].hex,2,4) == 'iPXE'",
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "http://[{{ SUBNETS[SUBNET]['nextserver'] }}]:{{ SUBNETS[SUBNET]['nextport'] }}/boot"
          }
        ]
      },
    {%- endif -%}
{%- endfor -%}

{%- for SHARE in SHARED -%}
    {%- for SUBNET in SHARED[SHARE] -%}
        {%- if SHARED[SHARE][SUBNET]['nextserver'] is defined %}
      {
        "name": "arch-x86-{{ SHARE }}",
        "test": "option[61].hex == 0x0007",
        #"only-in-additional-list": true,
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "tftp://{{ SHARED[SHARE][SUBNET]['nextserver'] }}/luna_ipxe.efi"
          }
        ]
      },
      {
        "name": "arch-arm64-{{ SHARE }}",
        "test": "option[61].hex == 0x000b",
        #"only-in-additional-list": true,
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "tftp://{{ SHARED[SHARE][SUBNET]['nextserver'] }}/luna_ipxe_arm64.efi"
          }
        ]
      },
        {%- endif -%}
    {%- endfor -%}
{%- endfor -%}

      {
        "name": "ipxe-kernel-default",
        "test": "0 == 1"
      },
      {
        "name": "ipxe-kernel-alternative",
        "test": "0 == 1"
      },
      {%- for BOOTFILE in [{'class': 'default', 'arch': 'x86', 'code': '0x0007', 'file': 'luna_ipxe.efi'}, {'class': 'default', 'arch': 'arm64', 'code': '0x000b', 'file': 'luna_ipxe_arm64.efi'}, {'class': 'alternative', 'arch': 'x86', 'code': '0x0007', 'file': 'luna_snponly.efi'}, {'class': 'alternative', 'arch': 'arm64', 'code': '0x000b', 'file': 'luna_snponly_arm64.efi'}] %}
      {%- for SUBNET in SUBNETS -%}
        {%- if SUBNETS[SUBNET]['nextserver'] is defined %}
      {
        "name": "ipxe-kernel-{{ BOOTFILE['class'] }}-{{ BOOTFILE['arch'] }}-{{ SUBNET }}",
        "test": "member('ipxe-kernel-{{ BOOTFILE['class'] }}') and option[61].hex == {{ BOOTFILE['code'] }}",
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "tftp://{{ SUBNETS[SUBNET]['nextserver'] }}/{{ BOOTFILE['file'] }}"
          }
        ]
      },
        {%- endif -%}
      {%- endfor -%}
      {%- for SHARE in SHARED -%}
        {%- for SUBNET in SHARED[SHARE] -%}
          {%- if SHARED[SHARE][SUBNET]['nextserver'] is defined %}
      {
        "name": "ipxe-kernel-{{ BOOTFILE['class'] }}-{{ BOOTFILE['arch'] }}-{{ SHARE }}",
        "test": "member('ipxe-kernel-{{ BOOTFILE['class'] }}') and option[61].hex == {{ BOOTFILE['code'] }}",
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "tftp://{{ SHARED[SHARE][SUBNET]['nextserver'] }}/{{ BOOTFILE['file'] }}"
          }
        ]
      },
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {%- endfor %}

{%- for SUBNET in SUBNETS -%}
    {%- if SUBNETS[SUBNET]['nextserver'] is defined %}
      {
        "name": "arch-x86-{{ SUBNET }}",
        "test": "option[61].hex == 0x0007",
        #"only-in-additional-list": true,
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "tftp://{{ SUBNETS[SUBNET]['nextserver'] }}/luna_ipxe.efi"
          }
        ]
      },
      {
        "name": "arch-arm64-{{ SUBNET }}",
        "test": "option[61].hex == 0x000b",
        #"only-in-additional-list": true,
        "option-data": [
          {
            "name": "bootfile-url",
            "code": 59,
            "data": "tftp://{{ SUBNETS[SUBNET]['nextserver'] }}/luna_ipxe_arm64.efi"
          }
        ]
      },
    {%- endif -%}
{%- endfor %}
      {
        # petit boot. we do nothing for openpower
        "name": "arch-openpower",
        #"only-in-additional-list": true,
        "test": "option[93].hex == '0x000e'"
      }
    ],

    "loggers": [
      {
        "name": "kea-dhcp6",
        "output_options": [
          {
            "output": "kea-dhcp6.log"
          }
        ],
        #"severity": "DEBUG",
        "severity": "WARN",
        "debuglevel": 1
      },
      {
        "name": "kea-dhcp6.classifier",
        "output_options": [{"output": "stdout"}],
        #"severity": "DEBUG",
        "severity": "WARN",
        "debuglevel": 1
      }
    ]
  }
}

{% endautoescape  %}
